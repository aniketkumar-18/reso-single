services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6380:6379"
    environment:
      - REDIS_ARGS=--maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - reso-net

  # Optional: local OTEL collector (comment out if using hosted)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    profiles: ["observability"]

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: on-failure
    networks:
      - reso-net
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src
        - action: rebuild
          path: pyproject.toml

networks:
  reso-net:
    driver: bridge
